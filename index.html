<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jot</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23FFC800'/></svg>">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lukashenning/Jot/main/icon.png">
  <link rel="apple-touch-icon" href="./icon_ios.png">
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;Jot&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;https://raw.githubusercontent.com/lukashenning/Jot/main/icon.png&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/png&quot;}],&quot;display&quot;:&quot;standalone&quot;}">
  <script>
    // Register the service worker so the app works offline after the first visit.
    // Silently ignored on file:// URLs (SW requires HTTPS) and in browsers that
    // don't support the API.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
  <style>
    html {
      /* Lets Chrome/Safari standalone web-app windows be resized this small.
         Regular browser windows have their own OS-level minimum (~500 px on
         macOS Chrome) that CSS cannot override, but PWA / installed-app windows
         respect this value. */
      min-width: 250px;
      min-height: 250px;
      /* Prevent iOS Safari from scaling up font sizes on rotation to landscape
         and then failing to restore them when rotating back to portrait. */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      /* Remove the browser's default 8px body margin so the editor's explicit
         padding values are the sole source of inset — without this the margin
         stacks on top of padding and makes the gap wider than intended. */
      margin: 0;
    }
    ::selection {
      background: rgba(0, 0, 0, 0.12);
      color: inherit;
    }
    #editor {
      width: 100%;
      min-height: 100vh;
      padding: 2rem;
      box-sizing: border-box;
      font-family: ui-monospace, 'SF Mono', monospace;
      caret-color: transparent;
      outline: none;
      overflow-wrap: break-word;
      hyphens: auto;
      -webkit-hyphens: auto;
      /* Suppress the iOS Cut/Copy/Paste/AutoFill callout on long-press */
      -webkit-touch-callout: none;
    }
    #block-cursor {
      position: fixed;
      width: 1ch;
      font-family: ui-monospace, 'SF Mono', monospace;
      background: rgba(0, 0, 0, 0.12);
      pointer-events: none;
      display: none;
    }
    #editor u {
      text-decoration: none;
      background: rgba(255, 200, 0, 0.3);
    }
    #editor a {
      color: #FFB500;
      text-decoration: none;
      cursor: pointer;
    }
    #editor u u {
      background: transparent;
    }
    .list-line {
      padding-left: calc((var(--level, 0) * 3 + 3) * 1ch);
    }
    .list-line::before {
      content: "\00a0- ";
      display: inline-block;
      width: 3ch;
      margin-left: -3ch;
      /* ui-monospace resolves to SF Mono on Apple platforms, bypassing Safari's
         restriction on accessing SF Mono by name from web content. */
      font-family: ui-monospace, 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
    }
    .list-line[data-bullet="arrow"]::before {
      content: "\00a0\2192 ";
    }
    .list-line[data-bullet="plus"]::before {
      content: "\00a0+ ";
    }
    .list-line[data-bullet="check"]::before {
      content: "\00a0\2713 ";
    }
    .list-line[data-bullet="check"] {
      color: #999;
    }
    @media (prefers-color-scheme: dark) {
      .list-line[data-bullet="check"] {
        color: #666;
      }
    }
    #jot-welcome {
      position: fixed;
      inset: 0;
      padding: 2rem;
      box-sizing: border-box;
      font-family: ui-monospace, 'SF Mono', monospace;
      background: white;
      overflow-y: auto;
      z-index: 100;
      overflow-wrap: break-word;
    }
    /* Contain scroll on welcome/confirm so it doesn't bleed to the editor. */
    #jot-welcome {
      overscroll-behavior: contain;
    }
    .jot-entry { cursor: pointer; }
    .jot-entry:hover, .jot-entry-selected { background: rgba(0,0,0,0.07); }
    .jot-new { cursor: pointer; }
    .jot-new:hover { background: rgba(0,0,0,0.07); }
    .jot-clear { cursor: pointer; }
    .jot-clear:hover { background: rgba(0,0,0,0.07); }
    /* While the user is navigating with arrow keys, suppress CSS :hover so the
       mouse cursor position doesn't interfere with keyboard selection.
       The :not() guard ensures that an entry which is *both* hovered and
       keyboard-selected still shows its selection highlight.
       Class is removed on the next mousemove event (see JS below). */
    body.jot-kb-nav .jot-entry:hover:not(.jot-entry-selected) { background: none; }
    /* Drag-and-drop file target indicator */
    body.jot-drag-target::after {
      content: '';
      position: fixed;
      inset: 0;
      box-shadow: inset 0 0 0 3px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      z-index: 500;
    }
    #jot-welcome u { text-decoration: none; background: rgba(255, 200, 0, 0.3); }
    @media (max-width: 600px), (pointer: coarse) {
      #editor, #jot-welcome { padding: 1rem; }
      #editor { padding-left: 16px; padding-right: 16px; }
    }
    /* Hide the editor and its cursor whenever any welcome/recovery/confirm
       overlay is present — prevents the document from bleeding through. */
    body:has(#jot-welcome) #editor,
    body:has(#jot-welcome) #block-cursor { visibility: hidden; }
    #jot-hint {
      position: fixed;
      /* Default position matches editor padding — overridden by JS when caret
         rect is available (i.e. editor is focused). */
      top: 2rem;
      left: 2rem;
      color: #bbb;
      font-family: ui-monospace, 'SF Mono', monospace;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }
    #jot-hint::before {
      content: "Press Escape to go back";
    }
    @media (pointer: coarse) {
      #jot-hint {
        top: 1rem;
        left: 16px;
      }
      #jot-hint::before {
        content: "Swipe from the left edge to go back";
      }
    }
    @media (prefers-color-scheme: dark) {
      #jot-hint { color: #444; }
    }
    .jot-img {
      max-height: 50vh;
      max-width: 50vw;
      height: auto;
      width: auto;
      display: block;
    }
    #jot-toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      /* No transform on the fixed element itself — transforms on position:fixed
         elements break fixed positioning in iOS Safari. GPU compositing is
         achieved via will-change on the inner pill instead. */
      padding: 8px;
      box-sizing: border-box;
      display: none;
      z-index: 200;
      pointer-events: none;
    }
    #jot-toolbar-inner {
      background: rgba(0,0,0,0.9);
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      box-shadow: -2px -2px 10px 0 rgba(0,0,0,0.25), 0px 4px 4px 0px rgba(0,0,0,0.25);
      pointer-events: auto;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* Center the pill and cap its width; will-change creates a GPU layer. */
      max-width: 546px;
      margin: 0 auto;
      will-change: transform;
    }
    #jot-toolbar button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.9);
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 1rem;
      line-height: 1;
      padding: 4px 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #jot-toolbar button:active { opacity: 0.5; }
    #jtb-bold   { font-weight: bold; }
    #jtb-italic { font-style: italic; }
    #jtb-underline { text-decoration: underline; text-underline-offset: 3px; }
    /* ⇥ ⇤ are 50% larger but have no vertical padding so the pill height
       stays the same as the 1rem + 4px/4px buttons alongside them. */
    #jtb-tab, #jtb-stab {
      font-size: 1.5rem;
      padding-top: 0;
      padding-bottom: 0;
    }
    /* toolbar hidden — @media (pointer: coarse) block removed */

    @media (prefers-color-scheme: dark) {
      body {
        background: #111;
        color: #e8e8e8;
      }
      #editor {
        color: #e8e8e8;
      }
      #block-cursor {
        background: rgba(255, 255, 255, 0.5);
      }
      ::selection {
        background: rgba(255, 255, 255, 0.5);
        color: inherit;
      }
      #editor u {
        background: rgba(255, 200, 0, 0.6);
      }
      #jot-welcome {
        background: #111;
        color: #e8e8e8;
      }
      .jot-entry:hover, .jot-entry-selected { background: rgba(255,255,255,0.08); }
      .jot-new:hover { background: rgba(255,255,255,0.08); }
      .jot-clear:hover { background: rgba(255,255,255,0.08); }
    }

  </style>
</head>
<body>
  <div id="editor" contenteditable="true" spellcheck="false"><div><br></div></div>
  <div id="block-cursor"></div>
  <div id="jot-hint"></div>
  <div id="jot-toolbar">
    <div id="jot-toolbar-inner">
      <button id="jtb-undo">↺</button>
      <button id="jtb-redo">↻</button>
      <button id="jtb-stab">⇤</button>
      <button id="jtb-tab">⇥</button>
      <button id="jtb-bold">B</button>
      <button id="jtb-italic">I</button>
      <button id="jtb-underline">U</button>
    </div>
  </div>

  <!-- Default "Jot Features" document — stored as plain markup so it reads
       and edits like any other Jot document. jotSeedFeatures() reads
       this template's innerHTML directly; no JS string escaping needed. -->
  <template id="jot-features-tpl">
    <div><b>About Jot</b></div>
    <div><i>Jot is a lightweight text editor that lives in a single HTML file. It offers simple formatting, indented lists, continuously backs up your work in localStorage and exports itself into every document you save.</i></div>
    <div><br></div>
    <div class="list-line" style="--level: 0;"><u>Save</u> any jot as HTML to export a local file. On mobile, <u>swipe from the right edge</u> to export. Anyone can continue work on the exported file!</div>
    <div><br></div>
    <div class="list-line" style="--level: 0;">You can <b>bold</b> text, <i>italicize</i> or <u>underline</u> to highlight it.</div>
    <div><br></div>
    <div class="list-line" style="--level: 0;">Select text and paste an URL to create a <a href="https://github.com/lukashenning/Jot" target="_blank" rel="noopener noreferrer">hyperlink</a>.</div>
    <div><br></div>
    <div class="list-line" style="--level: 0;">Type <u>-</u>, <u>+</u>, <u>#</u> or <u>&gt;</u> at the very beginning of a line to create a list item or change its bullet style.</div>
    <div class="list-line" style="--level: 1;" data-bullet="plus">Swipe right or press <u>Tab</u> to increase a list item's <b>indentation</b> level.</div>
    <div class="list-line" style="--level: 2;" data-bullet="arrow">Like so.</div>
    <div class="list-line" style="--level: 1;" data-bullet="plus">Swipe left or press <u>Shift+Tab</u> to decrease the indentation level.</div>
    <div><br></div>
    <div>Type <u>Backspace</u> or <u>Enter</u> at the very beginning of a list item to turn it into a regular line of text.</div>
    <div><br></div>
    <div>Swipe or use <u>Tab</u> in regular (<i>non-list</i>) lines to create simple tables like so:</div>
    <div><b>Player&nbsp; &nbsp; &nbsp; Score&nbsp; &nbsp; &nbsp; &nbsp;Comment</b></div>
    <div>Lukas&nbsp; &nbsp; &nbsp; &nbsp;19&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; Hello!</div>
    <div>Muriel&nbsp; &nbsp; &nbsp; 29&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &lt;3</div>
    <div>Bacon&nbsp; &nbsp; &nbsp; &nbsp;07&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (°œ°)</div>
    <div><br></div>
    <div>Every new jot is automatically <b>backed up</b> in your browser's local storage.</div>
    <div class="list-line" style="--level: 0;"><u>Swipe from the left edge</u> or press <u>Escape</u> to see all your jots.</div>
    <div class="list-line" style="--level: 1;" data-bullet="arrow"><i>Completely empty jots disappear from the list.</i></div>
    <div class="list-line" style="--level: 0;">Use <b>Reset</b> to clear all entries.</div>
    <div class="list-line" style="--level: 0;">Use <b>Recovery</b> to access snapshots of the ten last jots you re-opened, in case there's an accident.</div>
    <div><br></div>
    <div><b><i>Pro tip:</i></b> <i>Try pasting images or web content into your jot 🪄</i></div>
    <div><br></div>
  </template>

  <script>
    const editor = document.getElementById('editor');
    const blockCursor = document.getElementById('block-cursor');

    // Tell the browser to use <div> (not <p> or <br>) when its native Enter
    // handling fires as a fallback. Affects Firefox most visibly but is a
    // safe no-op on Chrome/Safari which also support the command.
    try { document.execCommand('defaultParagraphSeparator', false, 'div'); } catch (_) {}

    // Set to true in every keydown Enter branch so the beforeinput handler
    // knows whether our code already handled the keystroke.
    // Chrome fires beforeinput even after keydown.preventDefault() (non-spec).
    // Firefox/Safari only fire it when keydown did NOT prevent default.
    // In either case, if our keydown handler silently failed (e.g. getLineEl
    // returned null), the flag is false and we let the browser's native Enter
    // fire rather than blocking it, so the user always gets a new line.
    let _jotEnterHandled = false;
    function getCaretRect() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      const range = sel.getRangeAt(0);
      // Force a layout flush before reading coordinates. On iOS, after rapid DOM
      // changes (e.g. deleting several list lines in quick succession) the engine
      // can return stale getBoundingClientRect values until a reflow is triggered
      // (which normally only happens on scroll). Touching offsetHeight is enough.
      void editor.offsetHeight;
      let rect = range.getBoundingClientRect();
      if (rect && rect.height > 0) return rect;
      const marker = document.createElement('span');
      marker.textContent = '​';
      const tmp = range.cloneRange();
      tmp.insertNode(marker);
      const r = marker.getBoundingClientRect();
      marker.remove();
      return r.height > 0 ? { left: r.left, top: r.top, bottom: r.bottom, height: r.height } : null;
    }

    function updateCursor() {
      if (document.activeElement !== editor) {
        blockCursor.style.display = 'none';
        return;
      }
      const sel = window.getSelection();
      if (!sel || !sel.isCollapsed || !sel.rangeCount) {
        blockCursor.style.display = 'none';
        return;
      }
      const rect = getCaretRect();
      if (!rect) { blockCursor.style.display = 'none'; return; }
      // On iOS, position:fixed is relative to the visual viewport, but
      // getBoundingClientRect() is relative to the layout viewport. When the
      // keyboard shifts the visual viewport (offsetTop/Left != 0) the two
      // coordinate systems diverge and the cursor appears offset. Add the
      // visual viewport offset to re-align them.
      const vv = window.visualViewport;
      const vvTop  = vv ? vv.offsetTop  : 0;
      const vvLeft = vv ? vv.offsetLeft : 0;
      blockCursor.style.display = 'block';
      blockCursor.style.left = (rect.left + vvLeft) + 'px';
      blockCursor.style.top  = (rect.top  + vvTop)  + 'px';
      blockCursor.style.height = rect.height + 'px';
    }

    let _lastCursorTs = 0;
    let _cursorDirty  = false; // set on keydown so typing feels instant
    function loop(ts) {
      if (_cursorDirty || ts - _lastCursorTs >= 100) { // instant on input, ~10 fps idle
        _lastCursorTs = ts;
        _cursorDirty  = false;
        updateCursor();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    // selectionchange fires after the browser has actually moved the caret —
    // later than keydown (which fires before the DOM updates) and more reliably
    // than input on iOS (where the selection can still lag behind at input time).
    // Gated to editor focus so unrelated selections elsewhere don't trigger it.
    document.addEventListener('selectionchange', () => {
      if (document.activeElement === editor) _cursorDirty = true;
    }, { passive: true });
    editor.focus();

    function getLineEl() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      let node = sel.anchorNode;
      if (!node) return null;
      if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
      if (node === editor) {
        const idx = Math.min(sel.anchorOffset, editor.children.length - 1);
        return editor.children[idx] || null;
      }
      while (node && node.parentElement !== editor) node = node.parentElement;
      return (node && node !== editor) ? node : null;
    }

    function isAtStart(lineEl) {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || !sel.isCollapsed) return false;
      const range = sel.getRangeAt(0);
      try {
        const testRange = document.createRange();
        testRange.setStart(lineEl, 0);
        testRange.setEnd(range.startContainer, range.startOffset);
        return testRange.toString() === '';
      } catch { return false; }
    }

    function getLevel(el) {
      return parseInt(el.style.getPropertyValue('--level') || '0', 10);
    }

    function setLevel(el, level) {
      el.style.setProperty('--level', Math.max(0, level));
    }

    function plainNodes(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.cloneNode();
      if (node.nodeName === 'BR') return node.cloneNode();
      // <a> is intentionally NOT preserved here — pressing Enter should not
      // carry link formatting to the new line, consistent with B/I/U stripping.
      const frag = document.createDocumentFragment();
      for (const child of node.childNodes) frag.appendChild(plainNodes(child));
      return frag;
    }

    // Strip <a> wrappers from a fragment in-place, keeping their text content.
    // Used by the list-line Enter handler which bypasses plainNodes().
    function _stripLinks(frag) {
      for (const a of Array.from(frag.querySelectorAll('a'))) {
        while (a.firstChild) a.before(a.firstChild);
        a.remove();
      }
      return frag;
    }

    // Returns the <a> element if the collapsed range is at its very end,
    // null otherwise. Used to escape link context before typing.
    function _atLinkEnd(range) {
      if (!range.collapsed) return null;
      const c = range.startContainer, o = range.startOffset;
      // Cursor at end of a text node whose parent is <a>
      if (c.nodeType === Node.TEXT_NODE && c.parentNode?.nodeName === 'A'
          && o === c.length && c === c.parentNode.lastChild) {
        return c.parentNode;
      }
      // Cursor at end of the <a> element itself
      if (c.nodeName === 'A' && o === c.childNodes.length) return c;
      return null;
    }

    function getCursorColumn(lineEl) {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return 0;
      const range = sel.getRangeAt(0);
      try {
        const pre = document.createRange();
        pre.setStart(lineEl, 0);
        pre.setEnd(range.startContainer, range.startOffset);
        return pre.toString().length;
      } catch { return 0; }
    }

    function setCursorAtColumn(lineEl, targetCol) {
      let col = Math.max(0, Math.min(targetCol, lineEl.textContent.length));
      const walker = document.createTreeWalker(lineEl, NodeFilter.SHOW_TEXT);
      let node;
      while ((node = walker.nextNode()) !== null) {
        if (col <= node.textContent.length) {
          const range = document.createRange();
          range.setStart(node, col);
          range.collapse(true);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
        col -= node.textContent.length;
      }
      const range = document.createRange();
      range.selectNodeContents(lineEl);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function jotScrollToCursor() {
      const rect = getCaretRect();
      if (!rect) return;
      const vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const lineH = rect.height || 20;
      // On touch devices one line-height of clearance is enough (the on-screen
      // keyboard already provides visual separation); on desktop keep two.
      const clearance = window.matchMedia('(pointer: coarse)').matches ? lineH : lineH * 2;
      if (rect.bottom > vvh - clearance) {
        window.scrollBy(0, rect.bottom - (vvh - clearance));
      } else if (rect.top < 0) {
        window.scrollBy(0, rect.top);
      }
    }

    // ── Custom undo / redo ───────────────────────────────────────────────────
    // The browser's native undo only tracks execCommand and keyboard input.
    // Our DOM operations (list toggling, Enter splits, Tab, paste) bypass it,
    // so undo either does nothing or partially restores state. We intercept
    // Cmd+Z / Cmd+Shift+Z / Cmd+Y and mobile historyUndo/Redo beforeinput
    // events, and manage our own HTML + {line,col} cursor snapshots.
    const _undoStack = [];   // [{html, cur:{line,col}}]
    const _redoStack = [];
    let   _undoTimer         = null;
    let   _historyGestureTimer = null; // debounces iOS historyUndo/Redo bursts
    let   _undoApplying      = false;  // true while ZWS replenishment is running

    // Save cursor as {line index in editor.children, col within that line}.
    // Line-scoped col avoids the flat-char-offset ambiguity at div boundaries.
    function _undoCurPos() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return { line: 0, col: 0 };
      const range = sel.getRangeAt(0);
      const lineEl = getLineEl();
      if (!lineEl) return { line: 0, col: 0 };
      const line = Array.from(editor.children).indexOf(lineEl);
      try {
        const r = document.createRange();
        r.setStart(lineEl, 0);
        r.setEnd(range.startContainer, range.startOffset);
        return { line: Math.max(0, line), col: r.toString().length };
      } catch { return { line: Math.max(0, line), col: 0 }; }
    }

    // Restore cursor to a saved {line, col} position.
    function _undoSetCur(pos) {
      if (!pos) return;
      const lineEl = editor.children[pos.line] || editor.children[editor.children.length - 1];
      if (!lineEl) return;
      const walker = document.createTreeWalker(lineEl, NodeFilter.SHOW_TEXT);
      let node, rem = pos.col;
      while ((node = walker.nextNode())) {
        const len = node.textContent.length;
        if (rem <= len) {
          try {
            const r = document.createRange();
            r.setStart(node, rem);
            r.collapse(true);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(r);
          } catch {}
          return;
        }
        rem -= len;
      }
      // Fallback: start of the line element
      try {
        const r = document.createRange();
        r.setStart(lineEl, 0);
        r.collapse(true);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(r);
      } catch {}
    }

    // Push a snapshot before any custom DOM operation.
    // Cancels the debounced input timer so typing + a custom op
    // don't split into two tiny undo steps.
    function jotUndoSnap() {
      clearTimeout(_undoTimer);
      _undoTimer = null;
      const state = { html: editor.innerHTML, cur: _undoCurPos() };
      const last = _undoStack[_undoStack.length - 1];
      if (last && last.html === state.html) return; // deduplicate
      _undoStack.push(state);
      if (_undoStack.length > 200) _undoStack.shift();
      _redoStack.length = 0;
    }

    // Flush a pending input-debounce snapshot without clearing the redo branch.
    function _undoFlush() {
      if (!_undoTimer) return;
      clearTimeout(_undoTimer);
      _undoTimer = null;
      const state = { html: editor.innerHTML, cur: _undoCurPos() };
      const last = _undoStack[_undoStack.length - 1];
      if (!last || last.html !== state.html) {
        _undoStack.push(state);
        if (_undoStack.length > 200) _undoStack.shift();
      }
    }

    function _undoApply(state) {
      editor.innerHTML = state.html;
      _undoSetCur(state.cur);
      clearTimeout(jotTimer);
      if (jotCurrentId) jotTimer = setTimeout(jotSaveCurrent, 500);
      // On touch devices, iOS keeps its own native undo stack (~6 entries).
      // Each e.preventDefault() on a historyUndo event pops one native entry
      // without adding a replacement, so after ~6 undos iOS reports "nothing
      // to undo". Fix: insert a zero-width space via execCommand (which adds
      // one native entry), then strip it from the DOM directly via TreeWalker
      // (no execCommand → no second native entry). This refills the native
      // stack by one entry per undo step, keeping it perpetually non-empty.
      if (window.matchMedia('(pointer: coarse)').matches) {
        _undoApplying = true;
        setTimeout(() => {
          try {
            editor.focus();
            // Helper: place cursor at the very start of the editor.
            function _cursorToStart() {
              const el = editor.firstChild;
              if (!el) return;
              const r = document.createRange();
              r.setStart(el, 0);
              r.collapse(true);
              window.getSelection().removeAllRanges();
              window.getSelection().addRange(r);
            }

            // ── Replenish native UNDO stack ──────────────────────────────────
            // insertText adds one entry to the native undo stack and clears
            // the native redo stack. Stripping the ZWS directly from the DOM
            // (via TreeWalker, not execCommand) leaves the content at state.html
            // without adding a second entry — so native undo gains one token.
            _cursorToStart();
            document.execCommand('insertText', false, '​');
            const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
            let node;
            while ((node = walker.nextNode())) {
              if (node.textContent.includes('​'))
                node.textContent = node.textContent.replace(/​/g, '');
            }

            // ── Replenish native REDO stack ──────────────────────────────────
            // Insert a second ZWS, then immediately call execCommand('undo').
            // That moves the ZWS entry from native undo → native redo and
            // restores the DOM to state.html, giving iOS a redo token to fire
            // historyRedo on (so the redo gesture and keyboard-accessory button
            // stay enabled). The beforeinput handler lets this programmatic
            // undo through (returns early) while _undoApplying is true, so our
            // custom _doUndo() is not triggered. _undoApplying is released in a
            // nested setTimeout so any async historyUndo that execCommand('undo')
            // might dispatch also arrives while the gate is still up.
            _cursorToStart();
            document.execCommand('insertText', false, '​');
            document.execCommand('undo');

          } catch (_) {}
          // Restore cursor, then release the gate one task later so any async
          // beforeinput from execCommand('undo') still sees _undoApplying = true.
          _undoSetCur(state.cur);
          setTimeout(() => { _undoApplying = false; }, 0);
        }, 0);
      }
    }

    // Perform one undo step. Handles two cases:
    //  • Current HTML matches the stack top (normal case after debounced flush):
    //    pop top to redo, apply the entry below it.
    //  • Current HTML differs from stack top (operation ran but post-op state
    //    was never pushed — e.g. Enter pressed then immediately Cmd+Z):
    //    push current directly to redo, then restore the stack top.
    function _doUndo() {
      _undoFlush();
      if (!_undoStack.length) return;
      const curHtml = editor.innerHTML;
      const top = _undoStack[_undoStack.length - 1];
      if (top.html !== curHtml) {
        // Un-checkpointed current state → save to redo, restore checkpoint
        _redoStack.push({ html: curHtml, cur: _undoCurPos() });
        _undoApply(top);
      } else if (_undoStack.length > 1) {
        _redoStack.push(_undoStack.pop());
        _undoApply(_undoStack[_undoStack.length - 1]);
      }
    }

    function _doRedo() {
      if (!_redoStack.length) return;
      const state = _redoStack.pop();
      const curHtml = editor.innerHTML;
      const top = _undoStack[_undoStack.length - 1];
      if (!top || top.html !== curHtml) {
        _undoStack.push({ html: curHtml, cur: _undoCurPos() });
        if (_undoStack.length > 200) _undoStack.shift();
      }
      _undoApply(state);
    }

    function jotUndoClear() {
      _undoStack.length = 0;
      _redoStack.length = 0;
      clearTimeout(_undoTimer);
      _undoTimer = null;
      clearTimeout(_historyGestureTimer);
      _historyGestureTimer = null;
      _undoApplying = false;
    }

    function doTab(shift) {
      jotUndoSnap();
      const lineEl = getLineEl();
      if (!lineEl) return;
      const isList = lineEl.classList.contains('list-line');
      if (!isList) {
        if (!shift) {
          const col = getCursorColumn(lineEl);
          document.execCommand('insertText', false, ' '.repeat(6 - (col % 6)));
        } else {
          const col = getCursorColumn(lineEl);
          if (col > 0) setCursorAtColumn(lineEl, Math.floor((col - 1) / 6) * 6);
        }
        return;
      }
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed && sel.rangeCount) {
        const r = sel.getRangeAt(0);
        const targets = Array.from(editor.children).filter(l => l.classList.contains('list-line') && r.intersectsNode(l));
        if (targets.length > 1) {
          targets.forEach(l => setLevel(l, shift ? getLevel(l) - 1 : getLevel(l) + 1));
          return;
        }
      }
      setLevel(lineEl, shift ? getLevel(lineEl) - 1 : getLevel(lineEl) + 1);
    }

    function doUnderline() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;

      const uEls = new Set();
      let node = range.startContainer.nodeType === Node.TEXT_NODE
        ? range.startContainer.parentNode : range.startContainer;
      while (node && node !== editor) {
        if (node.nodeName === 'U') uEls.add(node);
        node = node.parentNode;
      }
      if (!range.collapsed) {
        editor.querySelectorAll('u').forEach(u => {
          if (range.intersectsNode(u)) uEls.add(u);
        });
      }
      if (uEls.size) {
        uEls.forEach(u => u.style.textDecoration = 'underline');
        document.execCommand('underline');
        editor.querySelectorAll('u').forEach(u => u.style.removeProperty('text-decoration'));
      } else {
        document.execCommand('underline');
      }
    }

    function doEscape() {
      if (jotExported) return;

      jotShowWelcome(jotLoad());

    // popover has no effect. Our toolbar sets jotAllowFormat=true before calling.

    }

    // Suppress the iOS context menu (Cut / Copy / Paste / AutoFill) that appears
    // on tap or selection. Combined with -webkit-touch-callout:none in CSS this
    // covers both the long-press callout and the programmatic context event.
    editor.addEventListener('contextmenu', e => e.preventDefault());

    editor.addEventListener('keydown', (e) => {
      const _jw = document.getElementById('jot-welcome');
      if (_jw && _jw.querySelector('.jot-entry-selected') && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        return;
      }

        // trigger a programmatic download of the serialised document instead.

          /^((?!chrome|android).)*safari/i.test(navigator.userAgent) &&
          (navigator.standalone === true ||

          // unavailable. On iOS/iPadOS the share sheet is rich (includes
          // "Save to Files"), so delegate to _jotMobileSave() there. On macOS

          e.preventDefault();
          const _isiOS = /iPhone|iPad|iPod/.test(navigator.userAgent) ||

          if (_isiOS) { _jotMobileSave(); return; }
          const _first = jotFirstLine();
          const _fname = (_first ? _first.replace(/\s+/g, '_') : 'jot') + '.html';
          const _html  = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
          const _blob  = new Blob([_html], { type: 'text/html' });
          const _url   = URL.createObjectURL(_blob);
          const _a     = document.createElement('a');
          _a.href     = _url;
          _a.download = _fname;
          document.body.appendChild(_a);
          _a.click();
          document.body.removeChild(_a);
          setTimeout(() => URL.revokeObjectURL(_url), 1000);
          return;
        }
        if (jotExported) {
          // Exported file: set title to the HTML filename right now so the
          // browser's "Save Page As" dialog sees it immediately. The title was
          // also set at load time (for the tab label), but it must be re-set
          // here because the dialog reads document.title at the instant the

          const _n = decodeURIComponent(_r).replace(/\.html$/i, '').replace(/\s+/g, '_');
          if (_n) document.title = _n;

          // No reset: the exported file's tab should always show the filename.
        } else {
          // Live app: temporarily rename the tab to the first line of text so
          // the "Save Page As" dialog defaults to a meaningful filename,
          // then restore 'Jot' after the dialog has had a chance to read it.
          const first = jotFirstLine();
          document.title = first ? first.replace(/\s+/g, '_') : 'jot';

        }

      }

      if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
        e.preventDefault();
        jotUndoSnap(); jotAllowFormat = true; document.execCommand('bold'); jotAllowFormat = false;
        return;
      }

        e.preventDefault();

      }

        e.preventDefault();
        jotUndoSnap(); jotAllowFormat = true; doUnderline(); jotAllowFormat = false;
        return;
      }

      // plain text rather than extend the link. Intercept printable characters,
      // insert them in a new text node placed after the <a>, and return.
      if (e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey) {

            const _lr = document.createRange();

            _lr.collapse(true);
            _ls.removeAllRanges();
            _ls.addRange(_lr);
            editor.dispatchEvent(new Event('input', { bubbles: true }));
            return;
          }
        }
      }

      const lineEl = getLineEl();
      if (!lineEl) return;
      const isList = lineEl.classList.contains('list-line');

      if (e.key === '-' && isAtStart(lineEl)) {
        e.preventDefault();
        jotUndoSnap();
        if (!isList) { lineEl.classList.add('list-line'); setLevel(lineEl, 0); }
        lineEl.removeAttribute('data-bullet');
        return;
      }

      if (e.key === '>' && isAtStart(lineEl)) {
        e.preventDefault();
        jotUndoSnap();
        if (!isList) { lineEl.classList.add('list-line'); setLevel(lineEl, 0); }
        lineEl.dataset.bullet = 'arrow';
        return;
      }

      if (e.key === '+' && isAtStart(lineEl)) {
        e.preventDefault();
        jotUndoSnap();
        if (!isList) { lineEl.classList.add('list-line'); setLevel(lineEl, 0); }
        lineEl.dataset.bullet = 'plus';
        return;
      }
      if (e.key === '#' && isAtStart(lineEl)) {
        e.preventDefault(); jotUndoSnap();
        if (!isList) { lineEl.classList.add('list-line'); setLevel(lineEl, 0); }
        lineEl.dataset.bullet = 'check';
        return;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        doTab(e.shiftKey);
        return;
      }

      if (e.key === 'Enter' && !isList && !e.shiftKey) {
        _jotEnterHandled = true;
        e.preventDefault();
        jotUndoSnap();
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const afterRange = range.cloneRange();
        afterRange.setEnd(lineEl, lineEl.childNodes.length);
        const fragment = afterRange.extractContents();
        const newLine = document.createElement('div');
        newLine.appendChild(plainNodes(fragment));
        if (!newLine.textContent && !newLine.querySelector('br')) newLine.innerHTML = '<br>';
        lineEl.after(newLine);
        if (!lineEl.textContent && !lineEl.querySelector('br')) lineEl.innerHTML = '<br>';
        const newRange = document.createRange();
        newRange.setStart(newLine, 0);
        newRange.collapse(true);
        sel.removeAllRanges();
        sel.addRange(newRange);
        requestAnimationFrame(jotScrollToCursor);
        return;
      }

      if (!isList) return;

      if (e.key === 'Backspace' && isAtStart(lineEl)) {
        e.preventDefault();

        lineEl.style.removeProperty('--level');
        return;
      }

      if (e.key === 'Enter' && e.shiftKey) {
        _jotEnterHandled = true;
        e.preventDefault();
        jotUndoSnap();
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const br = document.createElement('br');
        range.insertNode(br);
        const space = document.createTextNode(' ');
        br.after(space);

        if (_seA) { _seA.after(br); br.after(space); }
        const newRange = document.createRange();
        newRange.setStart(space, 0);
        newRange.collapse(true);
        sel.removeAllRanges();
        sel.addRange(newRange);
        requestAnimationFrame(jotScrollToCursor);
        return;
      }

      if (e.key === 'Enter' && !e.shiftKey && !lineEl.textContent.trim()) {
        // Empty list line + Enter → de-list it (same as Backspace at start).
        _jotEnterHandled = true;
        e.preventDefault();
        jotUndoSnap();
        lineEl.classList.remove('list-line');
        lineEl.style.removeProperty('--level');
        lineEl.removeAttribute('data-bullet');
        requestAnimationFrame(jotScrollToCursor);
        return;
      }

      if (e.key === 'Enter' && !e.shiftKey) {
        _jotEnterHandled = true;
        e.preventDefault();
        jotUndoSnap();
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const afterRange = range.cloneRange();
        afterRange.setEnd(lineEl, lineEl.childNodes.length);
        const fragment = afterRange.extractContents();
        const newLine = document.createElement('div');
        newLine.classList.add('list-line');
        setLevel(newLine, getLevel(lineEl));
        if (lineEl.dataset.bullet) newLine.dataset.bullet = lineEl.dataset.bullet;
        newLine.appendChild(_stripLinks(fragment));
        if (!newLine.textContent && !newLine.querySelector('br')) newLine.innerHTML = '<br>';
        lineEl.after(newLine);
        if (!lineEl.textContent && !lineEl.querySelector('br')) lineEl.innerHTML = '<br>';
        const newRange = document.createRange();
        newRange.setStart(newLine, 0);
        newRange.collapse(true);
        sel.removeAllRanges();
        sel.addRange(newRange);
        requestAnimationFrame(jotScrollToCursor);
        return;
      }
    });

    // ── Local storage ────────────────────────────────────────────────────────
    const JOT_KEY = 'jot_entries';
    const JOT_BACKUP_KEY = 'jot_backups';
    // Per-exported-file draft key: unique to the file's URL so each exported
    // .html gets its own unsaved-changes slot in localStorage.
    const JOT_EXPORT_DRAFT_KEY = 'jot_export_draft_' + window.location.href;

    function jotLoad() {
      try { return JSON.parse(localStorage.getItem(JOT_KEY) || '[]'); } catch { return []; }
    }

    function jotPersist(entries) {
      localStorage.setItem(JOT_KEY, JSON.stringify(entries));
    }

    function jotBackup(entry) {
      let backups;
      try { backups = JSON.parse(localStorage.getItem(JOT_BACKUP_KEY) || '[]'); } catch { backups = []; }
      backups.unshift({
        id: Date.now() + '_' + Math.random().toString(36).slice(2),
        html: entry.html,
        firstLine: entry.firstLine,
        openedAt: new Date().toISOString()
      });
      localStorage.setItem(JOT_BACKUP_KEY, JSON.stringify(backups.slice(0, 10)));
    }

    let jotCurrentId = null;
    let jotExported = false;
    let jotFromRecovery = false; // true while a Recovery snapshot is open

    function jotFirstLine() {
      // Normally each line is a <div> child, so children[0] is the first line.
      // But after a browser-native "select-all + delete" the editor can be left
      // with a bare text node instead of a wrapped <div>. In that case
      // children[0] is null and we'd return "" — causing jotShowWelcome to
      // filter the entry out and delete it from localStorage even though the
      // user has typed new content. Fall back to the full textContent so that
      // any text in the editor, regardless of whether it's wrapped, is found.
      // Walk all child elements to find the first line that has actual content,
      // so documents that start with one or more blank lines still show a title.
      // Strip zero-width spaces (​) before the emptiness check — Jot
      // inserts ZWS for undo/caret reasons and trim() does not remove them,
      // so a visually-empty line with only a ZWS would otherwise be mistaken
      // for the title line.
      const clean = s => s.replace(/​/g, '').trim();
      for (const el of editor.children) {
        const t = clean(el.textContent);
        if (t) return t;
      }
      // Bare text node fallback (browser-native select-all + delete edge case).
      return clean(editor.textContent);
    }

    function jotSaveCurrent() {
      if (jotExported || !jotCurrentId) return;
      const entries = jotLoad();
      const entry = entries.find(e => e.id === jotCurrentId);
      if (!entry) return;
      entry.html = editor.innerHTML;
      entry.firstLine = jotFirstLine();
      entry.updatedAt = new Date().toISOString();
      jotPersist(entries);
    }

    function jotCreate() {
      if (jotExported) return;
      const now = new Date().toISOString();
      jotCurrentId = now + '_' + Math.random().toString(36).slice(2);
      const entries = jotLoad();
      entries.push({ id: jotCurrentId, html: editor.innerHTML, firstLine: jotFirstLine(), createdAt: now, updatedAt: now });
      jotPersist(entries);
    }

    function jotFmt(iso) {
      const d = new Date(iso), p = n => String(n).padStart(2, '0');
      return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function jotEsc(t, maxLen = 56) {
      const s = t.length > maxLen ? t.slice(0, maxLen) + '…' : t;
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function jotOpenEntry(entry) {
      jotBackup(entry);
      const w = document.getElementById('jot-welcome');
      if (w) w.remove();
      editor.innerHTML = entry.html;
      jotUndoClear();
      _undoStack.push({ html: editor.innerHTML, cur: 0 });
      jotCurrentId = entry.id;
      jotFromRecovery = false;
      editor.focus();
      const first = editor.firstChild;
      if (first) {
        const r = document.createRange();
        r.setStart(first, 0);
        r.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(r);
      }
    }

    function jotStartNew() {
      const w = document.getElementById('jot-welcome');
      if (w) w.remove();
      jotCurrentId = null;
      jotFromRecovery = false;
      editor.innerHTML = '<div><br></div>';
      jotUndoClear();
      _undoStack.push({ html: editor.innerHTML, cur: 0 });
      editor.focus();
      const first = editor.firstChild;
      if (first) {
        const r = document.createRange();
        r.setStart(first, 0);
        r.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(r);
      }
    }

    function jotShowWelcome(entries) {
      jotToolbarHide();
      const cleaned = entries.filter(e => e.firstLine && e.firstLine.trim());
      if (cleaned.length !== entries.length) jotPersist(cleaned);
      // Nothing to show → seed the feature doc and reload so the user lands on
      // a populated start screen rather than a blank one.
      if (!cleaned.length) { jotSeedFeatures(); location.reload(); return; }
      const sorted = [...cleaned].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      const _existing = document.getElementById('jot-welcome');
      if (_existing) _existing.remove();
      const w = document.createElement('div');
      w.id = 'jot-welcome';

      let html = '<div><b>Jot</b></div><div><i>Start typing!</i></div><div><br></div>';

      if (sorted.length) {
        html += '<div><br></div>';
        html += '<div class="jot-new jot-entry">+ Start a new jot</div>';
        html += '<div><br></div><div><br></div>';
        sorted.forEach((entry, i) => {
          if (i > 0) html += '<div><br></div>';
          html += `<div class="jot-entry" data-id="${entry.id}">[${jotFmt(entry.updatedAt)}]<br>${jotEsc(entry.firstLine || '(empty)')}</div>`;
        });
        html += '<div><br></div><div><br></div>';
        html += '<div class="jot-entry" data-import-trigger="1">Import</div>';
        html += '<div><br></div>';
        html += '<div class="jot-entry" data-recovery="1">Recovery</div>';
        html += '<div><br></div>';
        html += '<div class="jot-clear">Reset</div>';
      }

      html += '<div><br></div><div><u>v7</u></div><div><u>Lukas Henning 27/05/2026</u></div><div><br></div>';
      w.innerHTML = html;
      document.body.appendChild(w);
      w.scrollTop = 0;

      w.addEventListener('click', e => {
        if (e.target.closest('.jot-new')) {
          jotStartNew();
          return;
        }
        const entryEl = e.target.closest('.jot-entry');
        if (entryEl) {
          if (entryEl.dataset.importTrigger) { jotShowImport(); return; }
          if (entryEl.dataset.recovery) { jotShowRecovery(); return; }
          const entry = cleaned.find(en => en.id === entryEl.dataset.id);
          if (entry) jotOpenEntry(entry);
          return;
        }
        if (e.target.closest('.jot-clear')) {
          jotShowClearConfirm();
        }
      });
    }

    function jotSeedFeatures() {
      const now = new Date().toISOString();
      const featHtml = document.getElementById('jot-features-tpl').innerHTML;
      const entries = [{ id: now + '_features', html: featHtml, firstLine: 'About Jot', createdAt: now, updatedAt: now }];
      jotPersist(entries);
      return entries;
    }

    function jotShowExportRecovery(draft) {
      const old = document.getElementById('jot-welcome');
      if (old) old.remove();

      const w = document.createElement('div');
      w.id = 'jot-welcome';
      w.dataset.screen = 'export-recovery';

      w.innerHTML = [
        '<div><b>Unsaved changes</b></div>',

        '<div class="jot-entry list-line" style="--level: 0;" data-bullet="arrow" data-export-action="continue"><b>Continue</b> where I left off.</div>',
        '<div><br></div>',
        '<div class="jot-entry list-line" style="--level: 0;" data-bullet="arrow" data-export-action="revert"><b>Revert</b> to original state.<br>(<i>...and lose all changes!</i>)</div>',
      ].join('');

          sel.addRange(r);

    // ── Import ────────────────────────────────────────────────────────────────
    async function jotImportFile(file) {
      try {
        const text = await file.text();
        const doc  = new DOMParser().parseFromString(text, 'text/html');
        const editorEl = doc.getElementById('editor');
        if (!editorEl) return false;        // not a Jot file
        const html = editorEl.innerHTML;
        if (!editorEl.textContent.trim()) return false;  // empty document
        let firstLine = '';
        for (const el of editorEl.children) {
          const t = el.textContent.trim();
          if (t) { firstLine = t; break; }
        }
        if (!firstLine) firstLine = editorEl.textContent.trim().slice(0, 80);
        const now     = new Date().toISOString();
        const entries = jotLoad();
        // Normalise both titles before comparing: collapse all whitespace
        // including non-breaking spaces ( ) that Jot stores in list lines.
        const _norm = s => s.replace(/[ \s]+/g, ' ').trim();
        const existing = entries.find(e => e.firstLine && _norm(e.firstLine) === _norm(firstLine));
        if (existing) {
          existing.html      = html;
          existing.firstLine = firstLine;
          existing.updatedAt = now;
        } else {
          const id = now + '_' + Math.random().toString(36).slice(2);
          entries.push({ id, html, firstLine, createdAt: now, updatedAt: now });
        }
        jotPersist(entries);
        return true;
      } catch (_) { return false; }
    }

    async function jotImportFromFiles(files) {
      const htmlFiles = Array.from(files).filter(f => /\.html?$/i.test(f.name));
      let count = 0;
      for (const f of htmlFiles) if (await jotImportFile(f)) count++;
      return count;
    }

    function jotShowImport() {
      // The web has no single native dialog that accepts both files and folders
      // simultaneously — those are separate browser APIs. This opens a standard
      // multi-file picker for .html/.htm files. Folder import is available via
      // drag and drop (which already handles recursive folder walks).
      const input = document.createElement('input');
      input.type     = 'file';
      input.accept   = '.html,.htm';
      input.multiple = true;
      input.addEventListener('change', async () => {
        await jotImportFromFiles(input.files);
        jotShowWelcome(jotLoad());
      });
      input.click();
    }

        '<div><b>Clearing Jot’s memory</b></div>',

        '<div class="jot-entry" data-confirm="yes"><b>Yes</b>, delete them all.</div>',
        '<div><br></div>',
        '<div class="jot-entry" data-confirm="no"><b>No</b>, take me back.</div>',
        '<div><br></div>',

    function jotShowRecovery() {

      const old = document.getElementById('jot-welcome');
      if (old) old.remove();

      const w = document.createElement('div');
      w.id = 'jot-welcome';
      w.dataset.screen = 'recovery';

      let html = '<div><b>Recovery</b></div>';
      html += '<div><i>These are snapshots of documents you recently opened.</i></div>';
      html += '<div><br></div>';

      if (backups.length) {
        backups.forEach((b, i) => {
          if (i > 0) html += '<div><br></div>';
          html += `<div class="jot-entry" data-backup-idx="${i}">[${jotFmt(b.openedAt)}] ${jotEsc(b.firstLine || '(empty)')}</div>`;
        });
      } else {
        html += '<div><i>No snapshots yet.</i></div>';

      document.body.appendChild(w);

        const entryEl = e.target.closest('.jot-entry[data-backup-idx]');
        if (!entryEl) return;
        const idx = parseInt(entryEl.dataset.backupIdx, 10);
        const backup = backups[idx];
        if (!backup) return;
        w.remove();
        editor.innerHTML = backup.html;
        jotCurrentId = null;
        jotFromRecovery = true;
        editor.focus();
        const first = editor.firstChild;
        if (first) {
          const r = document.createRange();
          r.setStart(first, 0);
          r.collapse(true);

      if (window.matchMedia('(pointer: coarse)').matches) {
        let _rSwipeX = 0, _rSwipeY = 0, _rSwipeT = 0;
        w.addEventListener('touchstart', e => {
          if (e.touches.length !== 1) { _rSwipeX = 0; return; }
          _rSwipeX = e.touches[0].clientX;
          _rSwipeY = e.touches[0].clientY;
          _rSwipeT = Date.now();
        }, { passive: true });
        w.addEventListener('touchend', e => {
          if (!_rSwipeX || e.changedTouches.length !== 1) return;
          const dx = e.changedTouches[0].clientX - _rSwipeX;
          const dy = e.changedTouches[0].clientY - _rSwipeY;
          const dt = Date.now() - _rSwipeT;
          const startX = _rSwipeX;
          _rSwipeX = 0;
          if (dx < 60 || Math.abs(dx) <= Math.abs(dy) * 1.5 || dt >= 400 || startX >= 60) return;
          jotShowWelcome(jotLoad());
        }, { passive: true });
      }

    // Init
    (function() {

        // Cmd+S save dialog always proposes the correct name, regardless of
        // editor focus state. Spaces become underscores to keep filenames clean.
        const _raw = window.location.href.split('/').pop().split('?')[0].split('#')[0];
        const _fname = decodeURIComponent(_raw).replace(/\.html$/i, '').replace(/\s+/g, '_');
        if (_fname) document.title = _fname;

        if (_draft) { jotShowExportRecovery(_draft); return; }

        return;

    // Welcome screen key handling
    document.addEventListener('keydown', e => {
      const w = document.getElementById('jot-welcome');
      if (w) {
        const entryEls = Array.from(w.querySelectorAll('.jot-entry'));
        const selEl = w.querySelector('.jot-entry-selected');
        const selIdx = selEl ? entryEls.indexOf(selEl) : -1;

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          e.preventDefault();
          // If no keyboard selection is active yet, treat the currently hovered
          // entry (if any) as the starting position — so the user can switch
          // from mouse to keyboard without the focus jumping to the top.
          let curIdx = selIdx;
          if (curIdx === -1) {
            const hov = w.querySelector('.jot-entry:hover');
            if (hov) curIdx = entryEls.indexOf(hov);
          }
          if (selEl) selEl.classList.remove('jot-entry-selected');
          let nextIdx;
          if (e.key === 'ArrowDown') {
            nextIdx = Math.min(curIdx + 1, entryEls.length - 1);
          } else {
            // ArrowUp: if already at top (or nothing yet) stay at 0
            nextIdx = curIdx > 0 ? curIdx - 1 : Math.max(curIdx, 0);
          }
          if (entryEls[nextIdx]) entryEls[nextIdx].classList.add('jot-entry-selected');
          document.body.classList.add('jot-kb-nav'); // suppress hover visuals
        } else if ((e.key === 'Enter' || e.key === ' ') && selEl) {
          e.preventDefault();
          selEl.click();
        } else if ((e.metaKey || e.ctrlKey) && e.key === 'o') {
          e.preventDefault();
          jotShowImport();
        } else if (e.key === 'Escape' && w.dataset.screen === 'export-recovery') {
          // Escape on the export-recovery screen = safe choice: continue draft.
          e.preventDefault();
          w.querySelector('.jot-entry[data-export-action="continue"]')?.click();
        } else if (e.key === 'Escape' && (w.dataset.screen === 'recovery' || w.dataset.screen === 'confirm')) {
          e.preventDefault();
          jotShowWelcome(jotLoad());
        } else if (e.key === 'Backspace' && !w.dataset.screen) {
          e.preventDefault();
          jotShowClearConfirm();
        } else if ((e.metaKey || e.ctrlKey) && e.key === 'v' && !w.dataset.screen) {
          // Paste while on the start screen → open a fresh jot first, then let
          // the browser's paste event fire naturally on the now-ready editor.
          jotStartNew();
        } else if (e.key !== 'Escape' && e.key !== 'Enter' && e.key !== ' ' && !e.metaKey && !e.ctrlKey && !e.altKey && !w.dataset.screen) {
          w.remove();
          jotCurrentId = null;
          if (!e.defaultPrevented) {
            // The editor's keydown handler did not claim this key, so reset to
            // a clean first line and let the character be typed normally.
            editor.innerHTML = '<div><br></div>';
            editor.focus();
            const _first = editor.firstChild;
            if (_first) {
              const _r = document.createRange();
              _r.setStart(_first, 0);
              _r.collapse(true);
              const _sel = window.getSelection();
              _sel.removeAllRanges();
              _sel.addRange(_r);
            }
          }
          // If e.defaultPrevented, the editor's keydown handler already acted
          // (e.g. converted the first line to a list via -, >, or +) — keep
          // that result and do not reset the editor content.
        }
